
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-sans);background:var(--color-background-tertiary);color:var(--color-text-primary)}
:root{--sidebar-width:280px;--header-h:56px;--accent:#5B5FD9}
.app{width:100%;max-width:420px;margin:0 auto;height:680px;position:relative;overflow:hidden;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);display:flex;flex-direction:column}

/* HEADER */
.header{height:var(--header-h);display:flex;align-items:center;padding:0 14px;gap:10px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);flex-shrink:0;position:relative;z-index:10}
.header-title{flex:1;font-size:17px;font-weight:500;text-align:center}
.icon-btn{width:36px;height:36px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:var(--border-radius-md);color:var(--color-text-primary)}
.icon-btn:hover{background:var(--color-background-secondary)}
.icon-btn i{font-size:22px;color:var(--accent)}

/* SIDEBAR OVERLAY */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.35);z-index:20;opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.open{opacity:1;pointer-events:auto}

/* SIDEBAR */
.sidebar{position:absolute;top:0;left:0;bottom:0;width:var(--sidebar-width);background:var(--color-background-primary);z-index:30;transform:translateX(-100%);transition:transform .22s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;border-right:0.5px solid var(--color-border-tertiary)}
.sidebar.open{transform:translateX(0)}
.sb-header{padding:16px 14px 10px;border-bottom:0.5px solid var(--color-border-tertiary)}
.sb-title{font-size:18px;font-weight:500;margin-bottom:12px}
.sb-actions{display:flex;gap:8px}
.sb-actions button{flex:1;border:0.5px solid var(--color-border-secondary);background:none;border-radius:var(--border-radius-md);padding:7px 4px;font-size:12px;cursor:pointer;color:var(--color-text-secondary);display:flex;flex-direction:column;align-items:center;gap:3px}
.sb-actions button i{font-size:18px;color:var(--accent)}
.sb-search{margin:10px 14px 0;position:relative}
.sb-search input{width:100%;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:8px 12px 8px 34px;font-size:14px;background:var(--color-background-secondary);color:var(--color-text-primary)}
.sb-search .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--color-text-tertiary)}
.folder-list{flex:1;overflow-y:auto;padding:10px 0}
.folder-item{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;position:relative}
.folder-item:hover{background:var(--color-background-secondary)}
.folder-item.active{background:color-mix(in srgb,var(--accent) 10%,transparent)}
.folder-item i{font-size:20px;color:var(--accent)}
.folder-name{flex:1;font-size:15px}
.folder-count{font-size:12px;color:var(--color-text-tertiary);background:var(--color-background-secondary);padding:2px 7px;border-radius:20px}
.folder-del{display:none;border:none;background:none;cursor:pointer;padding:4px;color:#E24B4A}
.folder-item:hover .folder-del{display:flex}
.add-folder-btn{margin:0 14px 14px;border:0.5px dashed var(--color-border-secondary);background:none;border-radius:var(--border-radius-md);padding:10px;font-size:14px;cursor:pointer;color:var(--color-text-secondary);width:calc(100% - 28px);display:flex;align-items:center;justify-content:center;gap:6px}
.add-folder-btn:hover{background:var(--color-background-secondary)}

/* MEMO LIST */
.memo-list-view{flex:1;display:flex;flex-direction:column;overflow:hidden}
.ml-search{margin:10px 14px;position:relative}
.ml-search input{width:100%;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:8px 12px 8px 34px;font-size:14px;background:var(--color-background-secondary);color:var(--color-text-primary)}
.ml-search .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--color-text-tertiary)}
.memo-items{flex:1;overflow-y:auto;padding:0 14px}
.memo-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px;margin-bottom:10px;cursor:pointer;position:relative}
.memo-card:hover{border-color:var(--color-border-primary)}
.memo-card-title{font-size:15px;font-weight:500;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.memo-card-preview{font-size:13px;color:var(--color-text-secondary);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:6px}
.memo-card-meta{font-size:11px;color:var(--color-text-tertiary);display:flex;align-items:center;gap:4px}
.memo-card-del{position:absolute;top:10px;right:10px;border:none;background:none;cursor:pointer;opacity:0;color:#E24B4A;font-size:18px;padding:2px}
.memo-card:hover .memo-card-del{opacity:1}
.fab{position:absolute;bottom:20px;right:16px;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(91,95,217,0.35)}
.fab i{font-size:26px;color:#fff}
.empty-state{text-align:center;padding:50px 20px;color:var(--color-text-tertiary)}
.empty-state i{font-size:48px;margin-bottom:12px;display:block;color:var(--color-border-secondary)}
.empty-state p{font-size:14px}

/* EDITOR */
.editor-view{flex:1;display:flex;flex-direction:column;overflow:hidden}
.editor-body{flex:1;overflow-y:auto;padding:14px}
.editor-title-input{width:100%;border:none;font-size:20px;font-weight:500;padding:0 0 10px;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:12px;outline:none;background:transparent;color:var(--color-text-primary)}
.editor-content{width:100%;min-height:120px;border:none;outline:none;font-size:15px;line-height:1.7;background:transparent;resize:none;color:var(--color-text-primary);font-family:var(--font-sans)}
.editor-toolbar{padding:10px 14px;border-top:0.5px solid var(--color-border-tertiary);display:flex;gap:8px;align-items:center;background:var(--color-background-primary)}
.tb-btn{border:0.5px solid var(--color-border-secondary);background:none;border-radius:var(--border-radius-md);padding:8px 14px;font-size:13px;cursor:pointer;color:var(--color-text-secondary);display:flex;align-items:center;gap:5px}
.tb-btn i{font-size:16px;color:var(--accent)}
.tb-btn:hover{background:var(--color-background-secondary)}
.editor-meta{font-size:12px;color:var(--color-text-tertiary);padding:6px 14px 2px;display:flex;align-items:center;gap:4px}
.img-block{margin:8px 0;border-radius:var(--border-radius-md);overflow:hidden;position:relative;display:inline-block;max-width:100%}
.img-block img{max-width:100%;display:block;border-radius:var(--border-radius-md)}
.img-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.55);border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center}
.content-area{min-height:100px}

/* SETTINGS */
.settings-view{flex:1;overflow-y:auto;padding:14px}
.settings-section{margin-bottom:20px}
.settings-section-title{font-size:12px;color:var(--color-text-tertiary);font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-left:4px}
.setting-row{display:flex;align-items:center;padding:12px 14px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:6px;cursor:pointer;gap:12px}
.setting-row:hover{background:var(--color-background-secondary)}
.setting-row i{font-size:20px;color:var(--accent)}
.setting-label{flex:1;font-size:15px}
.setting-value{font-size:13px;color:var(--color-text-tertiary)}
.toggle{width:42px;height:24px;border-radius:12px;background:var(--color-border-secondary);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:left .2s}
.toggle.on::after{left:21px}
</style>

<h2 class="sr-only">휴대폰용 메모장 앱 — 폴더, 메모 작성, 사진 첨부 기능 포함</h2>

<div class="app" id="app">
  <div class="header" id="header">
    <button class="icon-btn" id="menuBtn" aria-label="메뉴"><i class="ti ti-menu-2"></i></button>
    <span class="header-title" id="headerTitle">전체 메모</span>
    <button class="icon-btn" id="headerRightBtn" aria-label="새 메모"><i class="ti ti-plus"></i></button>
  </div>

  <div class="overlay" id="overlay"></div>

  <div class="sidebar" id="sidebar">
    <div class="sb-header">
      <div class="sb-title">메모장</div>
      <div class="sb-actions">
        <button onclick="showSettings()"><i class="ti ti-settings"></i>설정</button>
        <button onclick="focusSbSearch()"><i class="ti ti-search"></i>검색</button>
        <button onclick="toggleFolderEdit()"><i class="ti ti-edit"></i>폴더 편집</button>
      </div>
      <div class="sb-search" style="margin-top:12px">
        <i class="ti ti-search si"></i>
        <input type="text" id="sbSearch" placeholder="폴더 검색..." oninput="filterFolders(this.value)">
      </div>
    </div>
    <div class="folder-list" id="folderList"></div>
    <button class="add-folder-btn" onclick="addFolder()"><i class="ti ti-folder-plus"></i>새 폴더 추가</button>
  </div>

  <div id="mainContent" style="flex:1;display:flex;flex-direction:column;overflow:hidden"></div>
</div>

<input type="file" id="imgPicker" accept="image/*" style="display:none" multiple>

<script>
const $ = id => document.getElementById(id);

let state = {
  view: 'list',
  currentFolder: null,
  currentMemo: null,
  folderEdit: false,
  folders: [
    {id:'f1', name:'업무', icon:'ti-briefcase'},
    {id:'f2', name:'개인', icon:'ti-user'},
    {id:'f3', name:'아이디어', icon:'ti-bulb'},
  ],
  memos: [
    {id:'m1',folder:'f1',title:'Q3 보고서 초안',content:'오늘 회의에서 나온 내용 정리\n\n- 매출 15% 증가\n- 신규 고객 확보 필요\n- 마케팅 예산 조정',images:[],date:new Date('2025-06-16T10:30:00')},
    {id:'m2',folder:'f1',title:'미팅 일정',content:'월요일 오전 10시 팀 회의\n수요일 오후 2시 고객 미팅',images:[],date:new Date('2025-06-15T14:00:00')},
    {id:'m3',folder:'f2',title:'장보기 목록',content:'우유, 계란, 빵, 사과',images:[],date:new Date('2025-06-14T09:00:00')},
  ]
};

function fmtDate(d){
  const now=new Date();const diff=now-d;
  if(diff<60000)return '방금 전';
  if(diff<3600000)return Math.floor(diff/60000)+'분 전';
  if(diff<86400000)return Math.floor(diff/3600000)+'시간 전';
  const mo=d.getMonth()+1;const dy=d.getDate();
  const hr=String(d.getHours()).padStart(2,'0');const mn=String(d.getMinutes()).padStart(2,'0');
  return mo+'월 '+dy+'일 '+hr+':'+mn;
}

function uid(){return 'id'+Date.now()+Math.random().toString(36).slice(2)}

function renderFolders(filter=''){
  const list=$('folderList');
  const all={id:'all',name:'전체 메모',icon:'ti-notes'};
  const items=[all,...state.folders].filter(f=>f.name.includes(filter)||f.id==='all');
  list.innerHTML=items.map(f=>{
    const cnt=f.id==='all'?state.memos.length:state.memos.filter(m=>m.folder===f.id).length;
    const active=state.currentFolder===(f.id==='all'?null:f.id)?'active':'';
    const delBtn=f.id!=='all'&&state.folderEdit?`<button class="folder-del" onclick="deleteFolder('${f.id}',event)"><i class="ti ti-trash"></i></button>`:'';
    return`<div class="folder-item ${active}" onclick="selectFolder('${f.id}')">
      <i class="ti ${f.icon}"></i>
      <span class="folder-name">${f.name}</span>
      <span class="folder-count">${cnt}</span>
      ${delBtn}
    </div>`;
  }).join('');
}

function selectFolder(id){
  state.currentFolder=id==='all'?null:id;
  state.view='list';
  closeSidebar();
  renderAll();
}

function filterFolders(v){renderFolders(v)}

function focusSbSearch(){$('sbSearch').focus()}

function toggleFolderEdit(){
  state.folderEdit=!state.folderEdit;
  renderFolders();
}

function addFolder(){
  const name=prompt('폴더 이름을 입력하세요:');
  if(!name||!name.trim())return;
  const icons=['ti-folder','ti-folder-open','ti-star','ti-heart','ti-bookmark'];
  state.folders.push({id:uid(),name:name.trim(),icon:icons[Math.floor(Math.random()*icons.length)]});
  renderFolders();
}

function deleteFolder(id,e){
  e.stopPropagation();
  if(!confirm('폴더를 삭제할까요? 안에 있는 메모도 함께 삭제됩니다.'))return;
  state.folders=state.folders.filter(f=>f.id!==id);
  state.memos=state.memos.filter(m=>m.folder!==id);
  if(state.currentFolder===id){state.currentFolder=null}
  renderFolders();
  renderMain();
}

function openSidebar(){
  $('sidebar').classList.add('open');
  $('overlay').classList.add('open');
}
function closeSidebar(){
  $('sidebar').classList.remove('open');
  $('overlay').classList.remove('open');
}

$('overlay').onclick=closeSidebar;
$('menuBtn').onclick=()=>{renderFolders();openSidebar()};

function renderMain(){
  const mc=$('mainContent');
  const hTitle=$('headerTitle');
  const hrBtn=$('headerRightBtn');

  if(state.view==='list'){
    const folder=state.folders.find(f=>f.id===state.currentFolder);
    hTitle.textContent=folder?folder.name:'전체 메모';
    hrBtn.innerHTML='<i class="ti ti-plus"></i>';hrBtn.onclick=newMemo;

    const memos=state.memos.filter(m=>!state.currentFolder||m.folder===state.currentFolder);
    let mlSearch='';
    mc.innerHTML=`<div class="memo-list-view">
      <div class="ml-search"><i class="ti ti-search si"></i><input type="text" placeholder="이 폴더에서 검색..." oninput="filterMemos(this.value)" id="mlSearchInput"></div>
      <div class="memo-items" id="memoItems"></div>
    </div><button class="fab" onclick="newMemo()" aria-label="새 메모"><i class="ti ti-plus"></i></button>`;
    renderMemoItems(memos);

  }else if(state.view==='editor'){
    const m=state.currentMemo;
    const folder=state.folders.find(f=>f.id===m.folder)||{name:'전체'};
    hTitle.textContent=folder.name;
    hrBtn.innerHTML='<i class="ti ti-check"></i>';hrBtn.onclick=saveAndBack;

    mc.innerHTML=`<div class="editor-view">
      <div class="editor-meta"><i class="ti ti-clock" style="font-size:13px"></i><span id="memoDateDisplay">${fmtDate(m.date)}</span></div>
      <div class="editor-body">
        <input class="editor-title-input" id="edTitle" placeholder="제목" value="${escHtml(m.title)}">
        <div class="content-area" id="contentArea"></div>
      </div>
      <div class="editor-toolbar">
        <button class="tb-btn" onclick="insertPhoto()"><i class="ti ti-photo"></i>사진 추가</button>
        <button class="tb-btn" onclick="saveAndBack()"><i class="ti ti-device-floppy"></i>저장</button>
      </div>
    </div>`;
    renderEditorContent();

  }else if(state.view==='settings'){
    hTitle.textContent='설정';
    hrBtn.innerHTML='';hrBtn.onclick=null;
    mc.innerHTML=`<div class="settings-view">
      <div class="settings-section">
        <div class="settings-section-title">표시</div>
        <div class="setting-row"><i class="ti ti-text-size"></i><span class="setting-label">글자 크기</span><span class="setting-value">보통</span></div>
        <div class="setting-row" onclick="this.querySelector('.toggle').classList.toggle('on')"><i class="ti ti-moon"></i><span class="setting-label">다크 모드</span><div class="toggle"></div></div>
        <div class="setting-row" onclick="this.querySelector('.toggle').classList.toggle('on')"><i class="ti ti-clock"></i><span class="setting-label">날짜/시간 표시</span><div class="toggle on"></div></div>
      </div>
      <div class="settings-section">
        <div class="settings-section-title">저장</div>
        <div class="setting-row" onclick="this.querySelector('.toggle').classList.toggle('on')"><i class="ti ti-device-floppy"></i><span class="setting-label">자동 저장</span><div class="toggle on"></div></div>
        <div class="setting-row"><i class="ti ti-download"></i><span class="setting-label">메모 내보내기</span><span class="setting-value"><i class="ti ti-chevron-right"></i></span></div>
      </div>
      <div class="settings-section">
        <div class="settings-section-title">정보</div>
        <div class="setting-row"><i class="ti ti-info-circle"></i><span class="setting-label">버전</span><span class="setting-value">1.0.0</span></div>
      </div>
    </div>`;
  }
}

function renderMemoItems(memos){
  const cont=$('memoItems');
  if(!cont)return;
  if(!memos.length){
    cont.innerHTML=`<div class="empty-state"><i class="ti ti-notes"></i><p>메모가 없어요<br>아래 + 버튼으로 추가해보세요</p></div>`;return;
  }
  cont.innerHTML=memos.sort((a,b)=>b.date-a.date).map(m=>`
    <div class="memo-card" onclick="openMemo('${m.id}')">
      <div class="memo-card-title">${escHtml(m.title)||'(제목 없음)'}</div>
      <div class="memo-card-preview">${escHtml(m.content)||'내용 없음'}</div>
      <div class="memo-card-meta"><i class="ti ti-clock" style="font-size:11px"></i>${fmtDate(m.date)}</div>
      <button class="memo-card-del" onclick="deleteMemo('${m.id}',event)" aria-label="삭제"><i class="ti ti-trash"></i></button>
    </div>`).join('');
}

function filterMemos(v){
  const base=state.memos.filter(m=>!state.currentFolder||m.folder===state.currentFolder);
  const filtered=v?base.filter(m=>m.title.includes(v)||m.content.includes(v)):base;
  renderMemoItems(filtered);
}

function newMemo(){
  const fid=state.currentFolder||state.folders[0]?.id||'f1';
  const m={id:uid(),folder:fid,title:'',content:'',images:[],date:new Date()};
  state.memos.push(m);
  state.currentMemo=m;
  state.view='editor';
  renderMain();
}

function openMemo(id){
  state.currentMemo=state.memos.find(m=>m.id===id);
  state.view='editor';
  renderMain();
}

function deleteMemo(id,e){
  e.stopPropagation();
  if(!confirm('메모를 삭제할까요?'))return;
  state.memos=state.memos.filter(m=>m.id!==id);
  renderMain();
}

function saveAndBack(){
  const m=state.currentMemo;
  if(!m)return;
  m.title=$('edTitle')?.value||'';
  m.content=getEditorText();
  m.date=new Date();
  state.view='list';
  renderMain();
}

function showSettings(){
  closeSidebar();
  state.view='settings';
  renderMain();
}

$('headerRightBtn').onclick=newMemo;

function renderAll(){renderFolders();renderMain()}

// Editor content with images
let editorBlocks=[];

function renderEditorContent(){
  const m=state.currentMemo;
  editorBlocks=[];
  const lines=m.content.split('\n');
  editorBlocks.push({type:'text',value:m.content});
  m.images.forEach(img=>editorBlocks.push({type:'img',value:img}));
  updateEditorDOM();
}

function updateEditorDOM(){
  const ca=$('contentArea');if(!ca)return;
  const m=state.currentMemo;
  ca.innerHTML='';
  const ta=document.createElement('textarea');
  ta.className='editor-content';ta.id='edContent';
  ta.placeholder='내용을 입력하세요...';ta.value=m.content;
  ta.oninput=()=>{m.content=ta.value};
  ca.appendChild(ta);
  m.images.forEach((src,i)=>{
    const d=document.createElement('div');d.className='img-block';
    const img=document.createElement('img');img.src=src;img.alt='첨부 이미지';
    const btn=document.createElement('button');btn.className='img-del';btn.innerHTML='<i class="ti ti-x"></i>';btn.onclick=()=>{m.images.splice(i,1);updateEditorDOM()};
    d.appendChild(img);d.appendChild(btn);ca.appendChild(d);
  });
}

function getEditorText(){return $('edContent')?.value||state.currentMemo?.content||''}

function insertPhoto(){
  $('imgPicker').click();
}

$('imgPicker').onchange=function(){
  const files=Array.from(this.files);
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      state.currentMemo.images.push(e.target.result);
      updateEditorDOM();
    };
    reader.readAsDataURL(file);
  });
  this.value='';
};

function escHtml(s){
  if(!s)return'';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

renderAll();
</script>
